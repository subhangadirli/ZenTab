<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ZenTab Settings</title>
  <link rel="stylesheet" href="../../assets/styles/main.css">
  <link rel="stylesheet" href="../../assets/styles/themes/dark.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 64px 40px;
      overflow-y: auto;
    }
    .settings-container {
      width: 100%;
      max-width: 600px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 32px 40px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.2);
    }
    h1 {
      font-family: var(--font-serif);
      font-weight: 400;
      font-size: 1.8rem;
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--search-border);
    }
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 0;
      border-bottom: 1px solid rgba(255,255,255,0.02);
    }
    .setting-label {
      font-size: 1rem;
      color: var(--text-main);
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    .setting-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.4;
    }
    select {
      background: rgba(255,255,255,0.05);
      color: var(--text-main);
      border: 1px solid var(--search-border);
      padding: 10px 16px;
      border-radius: 8px;
      outline: none;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all var(--transition-speed) var(--transition-ease);
    }
    select:hover {
      background: rgba(255,255,255,0.08);
    }
    /* Toggle switch */
    .toggle {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 26px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(255,255,255,0.1);
      transition: .2s; border-radius: 26px;
      border: 1px solid transparent;
    }
    .slider:before {
      position: absolute; content: "";
      height: 18px; width: 18px; left: 4px; bottom: 3px;
      background-color: var(--text-muted);
      transition: .2s; border-radius: 50%;
    }
    input:checked + .slider { background-color: rgba(16, 185, 129, 0.2); border-color: var(--status-nominal); }
    input:checked + .slider:before { transform: translateX(22px); background-color: var(--status-nominal); }
  </style>
</head>
<body>
  <div class="settings-container">
    <h1>ZenTab Settings</h1>
    
    <div class="setting-row">
      <div>
        <div class="setting-label">Clock Format</div>
        <div class="setting-desc">Use 24-hour time format</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="setting-clock24h">
        <span class="slider"></span>
      </label>
    </div>
    
    <div class="setting-row">
      <div>
        <div class="setting-label">Search Engine</div>
        <div class="setting-desc">Default provider for the search bar</div>
      </div>
      <select id="setting-search">
        <option value="default">Default (Browser)</option>
        <option value="google">Google</option>
        <option value="duckduckgo">DuckDuckGo</option>
        <option value="bing">Bing</option>
      </select>
    </div>
    
    <div class="setting-row">
      <div>
        <div class="setting-label">Show Motivational Quote</div>
        <div class="setting-desc">Display a random design quote on the bottom left</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="setting-quote">
        <span class="slider"></span>
      </label>
    </div>
    
    <div class="setting-row" style="border-bottom: none;">
      <div>
        <div class="setting-label">Show Status Bar</div>
        <div class="setting-desc">Display the "SYSTEMS NOMINAL" indicator</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="setting-status">
        <span class="slider"></span>
      </label>
    </div>
  </div>
  
  <script type="module" src="settings.js"></script>
</body>
</html>
