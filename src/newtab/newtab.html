<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ZenTab</title>
  <link rel="stylesheet" href="../../assets/styles/main.css">
  <link rel="stylesheet" href="../../assets/styles/themes/dark.css">
  <style>
    /* NewTab specific additions */
    .top-actions {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .brand {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      letter-spacing: 0.5px;
      font-weight: 400;
      opacity: 0.9;
    }
    .avatar-circle {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background-color: #fbcbd4; /* Soft peach dummy avatar */
      opacity: 0.5;
      cursor: pointer;
      transition: opacity var(--transition-speed) var(--transition-ease);
    }
    .avatar-circle:hover { opacity: 1; transform: scale(1.05); }
    
    /* Component containers */
    #clock-container { margin-bottom: 12px; }
    #date-container { margin-bottom: 40px; }
    #search-container { margin-bottom: 40px; width: 100%; max-width: 560px; }
    #quicklinks-container { width: 100%; max-width: 680px; }
    
    .bottom-bar {
      align-items: center;
    }
  </style>
</head>
<body>
  <div id="app-container">
    <header class="top-bar">
      <div class="brand">ZenTab</div>
      <div class="top-actions">
        <button id="btn-settings" class="icon-btn" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
        <div class="avatar-circle"></div>
      </div>
    </header>
    
    <main class="center-section">
      <div id="clock-container"></div>
      <div id="date-container"></div>
      <div id="search-container"></div>
      <div id="quicklinks-container"></div>
    </main>
    
    <footer class="bottom-bar">
      <div id="quote-container" style="flex: 1; text-align: left;"></div>
      <div class="footer-center" style="flex: 1; display: flex; justify-content: center; gap: 20px;">
        <button id="btn-refresh-quote" class="icon-btn" title="New Quote">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
        </button>
        <button id="btn-refresh-page" class="icon-btn" title="Refresh Page">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
        </button>
      </div>
      <div id="status-container" style="flex: 1; display: flex; justify-content: flex-end;"></div>
    </footer>
  </div>
  <script type="module" src="newtab.js"></script>
</body>
</html>
